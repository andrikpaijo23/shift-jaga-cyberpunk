<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CyberShift - Admin Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Efek cyberpunk background */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 255, 0.03) 2px,
                rgba(0, 255, 255, 0.03) 4px
            );
            animation: scan 10s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { transform: translateY(0); }
            100% { transform: translateY(100px); }
        }

        .glass-card {
            background: rgba(10, 20, 30, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(0, 255, 255, 0.5);
            border-radius: 32px;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.3), inset 0 0 20px rgba(0, 255, 255, 0.05);
            padding: 45px 35px;
            max-width: 420px;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        .btn-cyber {
            background: linear-gradient(135deg, #0a0f2a, #001122);
            border: 1.5px solid #0ff;
            color: #0ff;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            font-size: 1rem;
            letter-spacing: 2px;
        }

        .btn-cyber:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 30px #0ff;
            transform: scale(1.02);
        }

        input {
            background: #0a0f1c;
            border: 1.5px solid #0ff;
            border-radius: 50px;
            padding: 14px 20px;
            color: #0ff;
            width: 100%;
            outline: none;
            margin-bottom: 25px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #f0f;
            box-shadow: 0 0 15px #f0f;
        }

        h1 {
            text-align: center;
            margin-bottom: 35px;
            background: linear-gradient(135deg, #0ff, #f0f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 2.2rem;
            letter-spacing: 3px;
        }

        .error-msg {
            color: #ff3366;
            text-align: center;
            margin-top: 18px;
            font-size: 0.9rem;
            text-shadow: 0 0 5px #ff3366;
        }

        .back-link {
            text-align: center;
            margin-top: 25px;
        }

        .back-link a {
            color: #0ff;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .back-link a:hover {
            color: #f0f;
            text-shadow: 0 0 5px #f0f;
        }

        .glow-text {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: #6cf;
        }

        @media (max-width: 480px) {
            .glass-card { padding: 30px 20px; }
            h1 { font-size: 1.6rem; }
            .btn-cyber { padding: 12px 20px; }
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>⚡ ADMIN ACCESS ⚡</h1>
        <form id="loginForm">
            <input type="password" id="adminPass" placeholder="🔐 MASUKKAN PASSWORD" autocomplete="off">
            <button type="submit" class="btn-cyber">⟢ LOGIN ⟣</button>
        </form>
        <div id="errorMsg" class="error-msg"></div>
        <div class="back-link">
            <a href="index.html">← Kembali ke Halaman Utama</a>
        </div>
        <div class="glow-text">
            🔒 Secure Access | CyberShift System
        </div>
    </div>

    <script>
        // Hapus session lama saat di halaman login
        sessionStorage.removeItem('admin_logged_in');
        
        const loginForm = document.getElementById('loginForm');
        const passInput = document.getElementById('adminPass');
        const errorMsg = document.getElementById('errorMsg');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const password = passInput.value;
            
            if (password === '230198') {
                // Set session admin
                sessionStorage.setItem('admin_logged_in', 'true');
                sessionStorage.setItem('admin_login_time', new Date().toISOString());
                // Redirect ke admin panel
                window.location.href = 'admin-panel.html';
            } else {
                errorMsg.innerHTML = '❌ PASSWORD SALAH! Akses ditolak. ❌';
                passInput.value = '';
                passInput.focus();
                
                // Efek shake
                const card = document.querySelector('.glass-card');
                card.style.transform = 'translateX(10px)';
                setTimeout(() => { card.style.transform = 'translateX(-10px)'; }, 100);
                setTimeout(() => { card.style.transform = 'translateX(0)'; }, 200);
            }
        });

        // Enter key handler
        passInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
