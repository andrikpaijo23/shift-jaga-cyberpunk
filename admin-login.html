<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CyberShift - Admin Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-card {
            background: rgba(10, 20, 30, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(0, 255, 255, 0.5);
            border-radius: 32px;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.3);
            padding: 45px 35px;
            max-width: 420px;
            width: 100%;
        }

        .btn-cyber {
            background: linear-gradient(135deg, #0a0f2a, #001122);
            border: 1.5px solid #0ff;
            color: #0ff;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }

        .btn-cyber:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 30px #0ff;
        }

        input {
            background: #0a0f1c;
            border: 1.5px solid #0ff;
            border-radius: 50px;
            padding: 14px 20px;
            color: #0ff;
            width: 100%;
            outline: none;
            margin-bottom: 25px;
            font-size: 1rem;
        }

        input:focus {
            border-color: #f0f;
            box-shadow: 0 0 15px #f0f;
        }

        h1 {
            text-align: center;
            margin-bottom: 35px;
            background: linear-gradient(135deg, #0ff, #f0f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .error-msg {
            color: #ff3366;
            text-align: center;
            margin-top: 18px;
        }

        .back-link {
            text-align: center;
            margin-top: 25px;
        }

        .back-link a {
            color: #0ff;
            text-decoration: none;
        }

        .back-link a:hover {
            color: #f0f;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>⚡ ADMIN ACCESS ⚡</h1>
        <form id="loginForm">
            <input type="password" id="adminPass" placeholder="🔐 MASUKKAN PASSWORD" autocomplete="off">
            <button type="submit" class="btn-cyber">⟢ LOGIN ⟣</button>
        </form>
        <div id="errorMsg" class="error-msg"></div>
        <div class="back-link">
            <a href="index.html">← Kembali ke Halaman Utama</a>
        </div>
    </div>

    <script>
        // Hapus session lama
        sessionStorage.removeItem('admin_logged_in');
        
        const loginForm = document.getElementById('loginForm');
        const passInput = document.getElementById('adminPass');
        const errorMsg = document.getElementById('errorMsg');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const password = passInput.value;
            
            if (password === '230198') {
                sessionStorage.setItem('admin_logged_in', 'true');
                window.location.href = 'admin-panel.html';
            } else {
                errorMsg.innerHTML = '❌ PASSWORD SALAH! Akses ditolak. ❌';
                passInput.value = '';
                passInput.focus();
            }
        });
    </script>
</body>
</html>
