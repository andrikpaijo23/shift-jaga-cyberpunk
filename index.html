<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>⚡ SHIFT JAGA CYBERPUNK ⚡</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', 'Poppins', monospace;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
            color: #0ff;
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: auto;
        }

        h1 {
            font-size: 2rem;
            text-align: center;
            text-shadow: 0 0 8px #0ff, 0 0 20px #0ff, 0 0 30px #f0f;
            border-bottom: 2px solid cyan;
            display: inline-block;
            margin-bottom: 2rem;
            letter-spacing: 3px;
            padding-bottom: 10px;
        }

        .title-center {
            text-align: center;
        }

        .card {
            background: rgba(10, 20, 30, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid cyan;
            border-radius: 28px;
            padding: 1.8rem;
            margin-bottom: 2rem;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 0 35px rgba(0, 255, 255, 0.5);
        }

        .grid-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.5rem;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 0.5rem;
            color: #ff66cc;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background: #0a0f1a;
            border: 1px solid cyan;
            border-radius: 14px;
            color: cyan;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            box-shadow: 0 0 12px cyan;
            background: #000000;
            border-color: magenta;
        }

        button {
            background: linear-gradient(90deg, #0ff, #f0f);
            border: none;
            padding: 12px 32px;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 40px;
            color: black;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 12px magenta;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 24px cyan;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid cyan;
            padding-bottom: 12px;
        }

        .tab-btn {
            background: transparent;
            border: 1px solid cyan;
            color: cyan;
            box-shadow: none;
            border-radius: 50px;
            padding: 8px 20px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .tab-btn:hover {
            background: cyan;
            color: black;
        }

        .tab-btn.active {
            background: cyan;
            color: black;
            border-color: magenta;
            box-shadow: 0 0 10px cyan;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #0d0f17cc;
            backdrop-filter: blur(4px);
        }

        th {
            background: cyan;
            color: black;
            padding: 12px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        td {
            padding: 10px;
            border-bottom: 0.5px solid cyan;
            color: #bbffdd;
        }

        .status-masuk { color: #0f0; text-shadow: 0 0 3px #0f0; font-weight: bold; }
        .status-off { color: #ffaa44; text-shadow: 0 0 3px #ffaa44; }
        .status-cuti { color: #ff66cc; text-shadow: 0 0 3px #ff66cc; }

        .loading {
            text-align: center;
            padding: 20px;
            color: cyan;
        }

        @media (max-width: 700px) {
            body { padding: 1rem; }
            .card { padding: 1rem; }
            th, td { font-size: 0.7rem; }
            button { width: 100%; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="title-center">
        <h1>⚡ SHIFT JAGA CYBERPUNK ⚡</h1>
    </div>

    <!-- FORM INPUT -->
    <div class="card">
        <form id="shiftForm">
            <div class="grid-form">
                <div>
                    <label>👤 NAMA LENGKAP</label>
                    <select id="nama" required>
                        <option value="">-- Pilih Nama --</option>
                    </select>
                </div>
                <div>
                    <label>📅 TANGGAL</label>
                    <input type="date" id="tanggal" required>
                </div>
                <div>
                    <label>📆 HARI</label>
                    <input type="text" id="hari" readonly required placeholder="Otomatis">
                </div>
                <div>
                    <label>🗓️ TAHUN</label>
                    <input type="text" id="tahun" readonly placeholder="Otomatis">
                </div>
                <div>
                    <label>🕒 SHIFT JAGA</label>
                    <select id="shift">
                        <option value="Pagi (07:00-19:00)">🌞 PAGI (07:00 - 19:00)</option>
                        <option value="Malam (19:00-07:00)">🌙 MALAM (19:00 - 07:00)</option>
                    </select>
                </div>
                <div>
                    <label>✅ STATUS</label>
                    <select id="status">
                        <option value="Masuk">✅ MASUK</option>
                        <option value="Off">❌ OFF</option>
                        <option value="Cuti">🏖️ CUTI</option>
                    </select>
                </div>
                <div>
                    <label>🔴 TANGGAL MERAH</label>
                    <select id="tanggalMerah">
                        <option value="">-- TIDAK ADA --</option>
                    </select>
                </div>
            </div>
            <div style="margin-top: 28px; text-align: center;">
                <button type="submit">💾 SIMPAN SHIFT JAGA 💾</button>
            </div>
        </form>
    </div>

    <!-- TABEL RIWAYAT PER NAMA -->
    <div class="card">
        <div class="tabs" id="tabContainer"></div>
        <div id="riwayatTable" class="table-wrapper">
            <p class="loading">🔮 Pilih nama untuk melihat rekap shift 🔮</p>
        </div>
    </div>
</div>

<script>
    // ========== GANTI DENGAN URL WEB APP ANDA ==========
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwlCzBY7mC0SzTQWe3dymf6juWNtkpdqplt1rULjxRTC87SQAK95B_M5Cz9Vc69d4ww/exec";
    // ===================================================

    let masterData = { daftarNama: [], tanggalMerah: [] };
    let currentNama = "";

    async function panggilAPI(payload) {
        try {
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'cors',
                headers: { 
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });
            const hasil = await response.json();
            return hasil;
        } catch (error) {
            console.error("Error:", error);
            return { success: false, message: "Gagal koneksi ke server" };
        }
    }

    async function loadMaster() {
        try {
            const hasil = await panggilAPI({ action: "master" });
            if (hasil && hasil.daftarNama) {
                masterData = hasil;
                
                // Isi dropdown nama
                const selectNama = document.getElementById('nama');
                selectNama.innerHTML = '<option value="">-- Pilih Nama --</option>';
                for (let i = 0; i < masterData.daftarNama.length; i++) {
                    selectNama.innerHTML += `<option value="${masterData.daftarNama[i]}">${masterData.daftarNama[i]}</option>`;
                }
                
                // Isi dropdown tanggal merah
                const selectMerah = document.getElementById('tanggalMerah');
                selectMerah.innerHTML = '<option value="">-- TIDAK ADA --</option>';
                for (let i = 0; i < masterData.tanggalMerah.length; i++) {
                    selectMerah.innerHTML += `<option value="${masterData.tanggalMerah[i]}">${masterData.tanggalMerah[i]}</option>`;
                }
                
                // Buat tab untuk setiap nama
                const tabContainer = document.getElementById('tabContainer');
                tabContainer.innerHTML = "";
                for (let i = 0; i < masterData.daftarNama.length; i++) {
                    const nama = masterData.daftarNama[i];
                    tabContainer.innerHTML += `<button class="tab-btn" data-nama="${nama}">${nama}</button>`;
                }
                
                // Event click tab
                const btns = document.querySelectorAll('.tab-btn');
                for (let i = 0; i < btns.length; i++) {
                    btns[i].addEventListener('click', async function() {
                        const allBtns = document.querySelectorAll('.tab-btn');
                        for (let j = 0; j < allBtns.length; j++) {
                            allBtns[j].classList.remove('active');
                        }
                        this.classList.add('active');
                        currentNama = this.getAttribute('data-nama');
                        await loadRiwayat(currentNama);
                    });
                }
            } else {
                console.error("Gagal load master:", hasil);
            }
        } catch (error) {
            console.error("Error loadMaster:", error);
            document.getElementById('tabContainer').innerHTML = '<p style="color:red">Gagal load data. Cek koneksi atau URL Web App.</p>';
        }
    }

    async function loadRiwayat(nama) {
        try {
            const hasil = await panggilAPI({ action: "riwayat", nama: nama });
            if (!hasil || hasil.length === 0) {
                document.getElementById('riwayatTable').innerHTML = `<p style="text-align:center">📭 Belum ada data untuk ${nama}</p>`;
                return;
            }
            
            let html = `<table>
                <thead>
                    <tr><th>📅 Tanggal</th><th>📆 Hari</th><th>🗓️ Tahun</th><th>🕒 Shift</th><th>✅ Status</th><th>🔴 Tanggal Merah</th></tr>
                </thead>
                <tbody>`;
            
            for (let i = 0; i < hasil.length; i++) {
                const r = hasil[i];
                let statusClass = "";
                if (r.Status === "Masuk") statusClass = "status-masuk";
                if (r.Status === "Off") statusClass = "status-off";
                if (r.Status === "Cuti") statusClass = "status-cuti";
                
                html += `<tr>
                            <td>${r.Tanggal || '-'}</td>
                            <td>${r.Hari || '-'}</td>
                            <td>${r.Tahun || '-'}</td>
                            <td>${r.Shift || '-'}</td>
                            <td class="${statusClass}">${r.Status || '-'}</td>
                            <td>${r["Tanggal Merah"] || '-'}</td>
                         </tr>`;
            }
            html += `</tbody>表`;
            document.getElementById('riwayatTable').innerHTML = html;
        } catch (error) {
            document.getElementById('riwayatTable').innerHTML = `<p style="color:red">Error loading data: ${error}</p>`;
        }
    }

    // Event submit form
    document.getElementById('shiftForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const nama = document.getElementById('nama').value;
        if (!nama || nama === "") {
            alert("⚠️ Pilih Nama Lengkap terlebih dahulu!");
            return;
        }
        
        const tanggal = document.getElementById('tanggal').value;
        if (!tanggal) {
            alert("⚠️ Pilih Tanggal!");
            return;
        }
        
        const payload = {
            action: "simpan",
            nama: nama,
            tanggal: tanggal,
            hari: document.getElementById('hari').value,
            tahun: document.getElementById('tahun').value,
            shift: document.getElementById('shift').value,
            status: document.getElementById('status').value,
            tanggalMerah: document.getElementById('tanggalMerah').value
        };
        
        const hasil = await panggilAPI(payload);
        alert(hasil.message);
        
        if (hasil.success) {
            // Refresh riwayat jika tab yang aktif sama
            if (currentNama === nama) {
                await loadRiwayat(nama);
            }
        }
    });

    // Otomatis mengisi hari dan tahun saat tanggal berubah
    document.getElementById('tanggal').addEventListener('change', function() {
        if (this.value) {
            const date = new Date(this.value);
            const hariArr = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            document.getElementById('hari').value = hariArr[date.getDay()];
            document.getElementById('tahun').value = date.getFullYear();
        }
    });

    // Set tanggal hari ini sebagai default
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('tanggal').value = today;
    const event = new Event('change');
    document.getElementById('tanggal').dispatchEvent(event);

    // Load semua data saat halaman dibuka
    window.onload = function() {
        loadMaster();
    };
</script>
</body>
</html>
