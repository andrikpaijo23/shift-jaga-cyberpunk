<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>⚡ SHIFT GUARD - Cyberpunk Absen</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Courier New', 'Fira Code', monospace;
    }
    body {
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
      color: #0ff;
      padding: 1.5rem;
      min-height: 100vh;
    }
    /* Neon glow & glitch effect */
    h1 {
      font-size: 2.2rem;
      text-shadow: 0 0 5px #0ff, 0 0 12px #0ff;
      border-left: 4px solid #f0f;
      padding-left: 1rem;
      margin-bottom: 1.5rem;
      letter-spacing: 3px;
    }
    .container {
      max-width: 1400px;
      margin: auto;
    }
    .card {
      background: rgba(10, 20, 30, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid #0ff;
      border-radius: 20px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
      transition: 0.2s;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.2rem;
      align-items: end;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #f0f;
    }
    input, select {
      background: #11161f;
      border: 1px solid #0ff;
      padding: 10px 12px;
      border-radius: 12px;
      color: #0ff;
      font-weight: bold;
      outline: none;
      transition: 0.2s;
    }
    input:focus, select:focus {
      box-shadow: 0 0 8px #0ff;
      border-color: #f0f;
    }
    button {
      background: linear-gradient(135deg, #0ff, #f0f);
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      font-weight: bold;
      color: #000;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 0 6px cyan;
    }
    button:active { transform: scale(0.96); }
    .btn-reset {
      background: #2a2a3a;
      box-shadow: none;
      color: #0ff;
    }
    .nama-tabel {
      font-size: 1.8rem;
      margin: 1rem 0 0.5rem;
      border-bottom: 2px dashed #f0f;
      display: inline-block;
    }
    .table-wrapper {
      overflow-x: auto;
      margin-bottom: 2rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #0a0f1ad9;
      border-radius: 16px;
    }
    th, td {
      padding: 12px 8px;
      text-align: left;
      border-bottom: 1px solid #0ff3;
    }
    th {
      background: #0f172f;
      color: #f0f;
      font-size: 0.8rem;
    }
    tr:hover {
      background: #0ff1a;
      text-shadow: 0 0 2px cyan;
    }
    .action-btn {
      background: none;
      border: 1px solid cyan;
      border-radius: 30px;
      padding: 4px 12px;
      margin: 0 4px;
      font-size: 0.7rem;
      color: cyan;
    }
    .delete-btn { border-color: #f66; color: #f66; }
    .filter-bar {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
      align-items: center;
    }
    @media (max-width: 680px) {
      body { padding: 1rem; }
      h1 { font-size: 1.5rem; }
    }
    .status-masuk { color: #0f0; text-shadow: 0 0 2px #0f0; }
    .status-off, .status-cuti { color: #ffaa44; }
  </style>
</head>
<body>
<div class="container">
  <h1>◢ SHIFT GUARD ◣ <span style="font-size: 1rem;">[CYBERPUNK EDITION]</span></h1>
  
  <div class="card">
    <h3 style="margin-bottom: 1rem;">▸ INPUT CATATAN SHIFT</h3>
    <div class="form-grid" id="formGrid">
      <div class="input-group"><label>NAMA LENGKAP</label><input type="text" id="nama" placeholder="ex: Andi Saputra" required></div>
      <div class="input-group"><label>TANGGAL</label><input type="date" id="tanggal"></div>
      <div class="input-group"><label>SHIFT</label><select id="shift"><option value="Pagi">Pagi (07:00-19:00)</option><option value="Malam">Malam (19:00-07:00)</option></select></div>
      <div class="input-group"><label>STATUS</label><select id="status"><option value="Masuk">Masuk</option><option value="Off">Off</option><option value="Cuti">Cuti</option></select></div>
      <div class="input-group"><label><input type="checkbox" id="merah"> TANGGAL MERAH (Libur Nasional)</label></div>
      <div class="input-group"><button id="simpanBtn">💾 SIMPAN DATA</button><button id="resetFormBtn" class="btn-reset">⟳ Reset</button></div>
    </div>
  </div>

  <div class="card">
    <div class="filter-bar">
      <label>📅 FILTER BULAN : </label>
      <input type="month" id="filterBulan">
      <button id="refreshDataBtn" style="background:#1f3a4b;">🔄 REFRESH DATA</button>
    </div>
    <div id="rekapArea">Memuat data shift...</div>
  </div>
</div>

<script>
  // GANTI DENGAN URL WEB APP DARI GOOGLE APPS SCRIPT
  const API_URL = 'https://script.google.com/macros/s/AKfycbyYVWclqYTE_gxRgidBr41s_Nl9hU56w_ngIzE1SOwCtKhEXhNZuVo_xHM_FJOozyzs/exec'; 

  let allRecords = [];
  let editingId = null;

  // Helper fetch ke backend
  async function callApi(action, payload = {}) {
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, ...payload })
      });
      return await res.json();
    } catch(e) { console.error(e); alert("Gagal konek ke server, cek URL Apps Script"); }
  }

  async function loadData() {
    const data = await callApi('getAll');
    if (data && Array.isArray(data)) allRecords = data;
    else allRecords = [];
    renderSemuaTabelPerNama();
  }

  function getHariDariTanggal(tglStr) {
    const days = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
    const d = new Date(tglStr);
    return days[d.getDay()];
  }

  async function simpanData() {
    const nama = document.getElementById('nama').value.trim();
    if (!nama) return alert("Nama harus diisi!");
    const tanggal = document.getElementById('tanggal').value;
    if (!tanggal) return alert("Pilih tanggal!");
    const shift = document.getElementById('shift').value;
    const statusVal = document.getElementById('status').value;
    const merah = document.getElementById('merah').checked;
    const hari = getHariDariTanggal(tanggal);
    const tahun = new Date(tanggal).getFullYear();
    
    const payload = { Nama: nama, Tanggal: tanggal, Hari: hari, Tahun: tahun, Shift: shift, Status: statusVal, TanggalMerah: merah };
    
    if (editingId) {
      payload.id = editingId;
      payload.action = 'update';
      const res = await callApi('update', payload);
      if (res.status) alert("Data diupdate!");
      else alert("Gagal update");
      editingId = null;
    } else {
      payload.action = 'add';
      const res = await callApi('add', payload);
      if (res.status) alert("Data tersimpan!");
    }
    resetForm();
    loadData();
  }

  function resetForm() {
    document.getElementById('nama').value = '';
    document.getElementById('tanggal').value = new Date().toISOString().slice(0,10);
    document.getElementById('shift').value = 'Pagi';
    document.getElementById('status').value = 'Masuk';
    document.getElementById('merah').checked = false;
    editingId = null;
  }

  async function hapusData(id) {
    if(confirm("Yakin hapus catatan ini?")){
      const res = await callApi('delete', { id: id });
      if(res.status) alert("Terhapus!");
      loadData();
    }
  }

  async function editRecord(rec) {
    document.getElementById('nama').value = rec.Nama;
    document.getElementById('tanggal').value = rec.Tanggal;
    document.getElementById('shift').value = rec.Shift;
    document.getElementById('status').value = rec.Status;
    document.getElementById('merah').checked = (rec.TanggalMerah === 'Ya');
    editingId = rec.ID;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function renderSemuaTabelPerNama() {
    const filterBulan = document.getElementById('filterBulan').value;
    let filtered = [...allRecords];
    if (filterBulan) {
      filtered = filtered.filter(r => r.Tanggal && r.Tanggal.startsWith(filterBulan));
    }
    // Group by Nama
    const group = {};
    filtered.forEach(rec => {
      if(!group[rec.Nama]) group[rec.Nama] = [];
      group[rec.Nama].push(rec);
    });
    // Urutkan nama
    const sortedNames = Object.keys(group).sort();
    const container = document.getElementById('rekapArea');
    if(sortedNames.length === 0) {
      container.innerHTML = `<div class="card" style="text-align:center">✨ Tidak ada data untuk filter ini ✨</div>`;
      return;
    }
    let html = '';
    for(let nama of sortedNames) {
      let records = group[nama];
      records.sort((a,b) => (a.Tanggal > b.Tanggal) ? 1 : -1);
      html += `<div style="margin-top: 1.8rem;"><div class="nama-tabel">🔹 ${nama.toUpperCase()} 🔹</div>
      <div class="table-wrapper">
      <table>
        <thead><tr>
          <th>Tanggal</th><th>Hari</th><th>Tahun</th><th>Shift</th><th>Status</th><th>Tanggal Merah</th><th>Jam Mulai</th><th>Jam Selesai</th><th>Aksi</th>
        </tr></thead><tbody>`;
      for(let rec of records) {
        const merahLabel = rec.TanggalMerah === 'Ya' ? '✅ Merah' : 'Tidak';
        const statusClass = (rec.Status === 'Masuk') ? 'status-masuk' : 'status-off';
        html += `<tr>
          <td>${rec.Tanggal}</td><td>${rec.Hari || '-'}</td><td>${rec.Tahun || '-'}</td><td>${rec.Shift}</td>
          <td class="${statusClass}">${rec.Status}</td><td>${merahLabel}</td>
          <td>${rec.JamMulai || '-'}</td><td>${rec.JamSelesai || '-'}</td>
          <td><button class="action-btn" onclick='editRecord(${JSON.stringify(rec).replace(/'/g, "&#39;")})'>✏️ Edit</button>
          <button class="action-btn delete-btn" onclick="hapusData('${rec.ID}')">🗑️ Hapus</button></td>
        </tr>`;
      }
      html += `</tbody></table></div></div>`;
    }
    container.innerHTML = html;
  }

  // Event binding
  document.getElementById('simpanBtn').onclick = simpanData;
  document.getElementById('resetFormBtn').onclick = resetForm;
  document.getElementById('refreshDataBtn').onclick = loadData;
  document.getElementById('filterBulan').addEventListener('change', () => renderSemuaTabelPerNama());
  
  // set default tanggal hari ini
  document.getElementById('tanggal').value = new Date().toISOString().slice(0,10);
  loadData();
</script>
</body>
</html>
