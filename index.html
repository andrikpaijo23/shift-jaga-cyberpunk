<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>CyberShift - Monitoring Shift Jaga</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Courier New', 'Fira Code', monospace;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
            min-height: 100vh;
            padding: 20px;
            color: #0ff;
        }

        .glass-card {
            background: rgba(10, 20, 30, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 255, 0.4);
            border-radius: 28px;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.2);
            padding: 28px;
        }

        .btn-cyber {
            background: linear-gradient(135deg, #0a0f2a, #001122);
            border: 1.5px solid #0ff;
            color: #0ff;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-cyber:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 20px #0ff;
            transform: translateY(-2px);
        }

        .header-cyber {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-cyber h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #0ff, #f0f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .filter-section {
            display: flex;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        input, select {
            background: #0a0f1c;
            border: 1px solid #0ff;
            border-radius: 20px;
            padding: 10px 16px;
            color: #0ff;
            flex: 1;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #f0f;
            box-shadow: 0 0 8px #f0f;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 10px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            text-align: left;
        }

        th {
            color: #f0f;
            font-weight: bold;
        }

        .scroll-table {
            overflow-x: auto;
        }

        .status-badge {
            background: rgba(0, 255, 255, 0.15);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
        }

        @media (max-width: 768px) {
            body { padding: 12px; }
            .glass-card { padding: 16px; }
            th, td { padding: 8px 4px; font-size: 0.7rem; }
            .btn-cyber { padding: 8px 16px; font-size: 0.8rem; }
        }

        .admin-fab {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 100;
        }

        .stats {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 255, 255, 0.3);
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .empty-row {
            text-align: center;
            padding: 40px;
            color: #6cf;
        }
    </style>
</head>
<body>
    <div class="glass-card" style="max-width: 1400px; margin: 0 auto;">
        <div class="header-cyber">
            <h1>⚠️ CYBER SHIFT MONITORING ⚡</h1>
            <p style="color: #9cf; margin-top: 8px;">| Real-time Logbook | Shift Management |</p>
        </div>

        <div class="filter-section">
            <input type="text" id="filterNama" placeholder="🔍 Filter Nama Karyawan...">
            <select id="filterShift">
                <option value="">📋 Semua Shift</option>
                <option value="Pagi">🌞 Pagi (07:00-19:00)</option>
                <option value="Malam">🌙 Malam (19:00-07:00)</option>
                <option value="OFF">💤 OFF</option>
                <option value="Cuti">🏖️ Cuti</option>
                <option value="Tanggal Merah">🔴 Tanggal Merah</option>
            </select>
            <button id="clearFilter" class="btn-cyber">⟳ Reset</button>
            <button id="refreshData" class="btn-cyber">🔄 Refresh</button>
        </div>

        <div class="scroll-table">
            <table id="rekapanTable">
                <thead>
                    <tr>
                        <th>👤 Nama</th>
                        <th>📅 Tanggal</th>
                        <th>⚙️ Shift</th>
                        <th>⏰ Jam Jaga</th>
                        <th>📝 Catatan</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="5" style="text-align:center">🔄 Memuat data shift......</td></tr>
                </tbody>
            </table>
        </div>

        <div class="stats" id="statsArea"></div>
        <div style="margin-top: 20px; text-align: center; font-size: 11px; color: #6cf;">
            💾 Data tersimpan di LocalStorage | © CyberShift System
        </div>
    </div>

    <div class="admin-fab">
        <a href="admin-login.html" class="btn-cyber" style="padding: 12px 24px;">🔐 ADMIN LOGIN</a>
    </div>

    <script>
        // Variabel global
        let shiftData = [];

        // Fungsi mendapatkan jam jaga
        function getJamRange(status) {
            const jamMap = {
                'Pagi': '07:00 - 19:00',
                'Malam': '19:00 - 07:00',
                'OFF': '— OFF —',
                'Cuti': '🏖️ Cuti Resmi',
                'Tanggal Merah': '🔴 Libur Nasional'
            };
            return jamMap[status] || '—';
        }

        // Format tanggal
        function formatTanggal(dateStr) {
            if (!dateStr) return '-';
            let parts = dateStr.split('-');
            if (parts.length !== 3) return dateStr;
            return `${parts[2]}/${parts[1]}/${parts[0]}`;
        }

        // Escape HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Load data dari localStorage
        function loadData() {
            const stored = localStorage.getItem('cyber_jaga_db');
            console.log('Loaded from storage:', stored); // Debug
            
            if (stored) {
                try {
                    shiftData = JSON.parse(stored);
                    if (!Array.isArray(shiftData)) shiftData = [];
                } catch(e) {
                    console.error('Error parsing:', e);
                    shiftData = [];
                }
            } else {
                // Data contoh untuk testing
                shiftData = [
                    { id: Date.now() + 1, nama: "Budi Santoso", tanggal: "2025-04-28", status: "Pagi", catatan: "Shift normal" },
                    { id: Date.now() + 2, nama: "Citra Dewi", tanggal: "2025-04-28", status: "Malam", catatan: "Waspada" },
                    { id: Date.now() + 3, nama: "Dedi Kurniawan", tanggal: "2025-04-29", status: "OFF", catatan: "Istirahat" }
                ];
                saveData();
            }
            
            renderTable();
            updateStats();
        }

        // Simpan ke localStorage
        function saveData() {
            localStorage.setItem('cyber_jaga_db', JSON.stringify(shiftData));
            console.log('Data saved:', shiftData.length, 'items'); // Debug
        }

        // Update statistik
        function updateStats() {
            const statsDiv = document.getElementById('statsArea');
            if (!statsDiv) return;
            
            const total = shiftData.length;
            const pagi = shiftData.filter(d => d.status === 'Pagi').length;
            const malam = shiftData.filter(d => d.status === 'Malam').length;
            
            statsDiv.innerHTML = `
                <div class="stat-item">📊 Total Data: ${total}</div>
                <div class="stat-item">🌞 Shift Pagi: ${pagi}</div>
                <div class="stat-item">🌙 Shift Malam: ${malam}</div>
                <div class="stat-item">🔄 Auto-sync: ON</div>
            `;
        }

        // Render tabel
        function renderTable() {
            const filterNama = document.getElementById('filterNama')?.value.toLowerCase() || '';
            const filterShiftVal = document.getElementById('filterShift')?.value || '';

            let filtered = [...shiftData];
            
            if (filterNama) {
                filtered = filtered.filter(item => item.nama && item.nama.toLowerCase().includes(filterNama));
            }
            if (filterShiftVal) {
                filtered = filtered.filter(item => item.status === filterShiftVal);
            }

            filtered.sort((a, b) => (b.tanggal || '').localeCompare(a.tanggal || ''));

            const tbody = document.getElementById('tableBody');
            if (!tbody) return;

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px;">⚡ Tidak ada data shift ⚡</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(item => `
                <tr>
                    <td><strong>${escapeHtml(item.nama)}</strong></td>
                    <td>${formatTanggal(item.tanggal)}</td>
                    <td><span class="status-badge">${item.status}</span></td>
                    <td>${getJamRange(item.status)}</td>
                    <td>${escapeHtml(item.catatan || '-')}</td>
                </tr>
            `).join('');
        }

        // Event listeners
        function setupEventListeners() {
            const filterNama = document.getElementById('filterNama');
            const filterShift = document.getElementById('filterShift');
            const clearBtn = document.getElementById('clearFilter');
            const refreshBtn = document.getElementById('refreshData');

            if (filterNama) filterNama.addEventListener('input', renderTable);
            if (filterShift) filterShift.addEventListener('change', renderTable);
            if (clearBtn) {
                clearBtn.addEventListener('click', () => {
                    if (filterNama) filterNama.value = '';
                    if (filterShift) filterShift.value = '';
                    renderTable();
                });
            }
            if (refreshBtn) {
                refreshBtn.addEventListener('click', () => {
                    loadData();
                });
            }
        }

        // Listen untuk perubahan storage dari halaman lain
        window.addEventListener('storage', (e) => {
            if (e.key === 'cyber_jaga_db') {
                console.log('Storage changed from another tab');
                loadData();
            }
        });

        // Inisialisasi
        window.addEventListener('DOMContentLoaded', () => {
            loadData();
            setupEventListeners();
        });
    </script>
</body>
</html>
