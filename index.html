<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Shift Jaga | Cyberpunk</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Courier New', 'Fira Code', monospace;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
      color: #0ff;
      padding: 20px;
    }

    /* Gaya Cyberpunk */
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .neon-card {
      background: rgba(10, 20, 30, 0.65);
      backdrop-filter: blur(12px);
      border: 1px solid #0ff;
      border-radius: 24px;
      box-shadow: 0 0 15px #0ff4, 0 0 5px #0ff2;
      padding: 24px;
      margin-bottom: 30px;
      transition: 0.3s;
    }

    .neon-card:hover {
      box-shadow: 0 0 30px #0ff, 0 0 10px #0ff;
    }

    h1, h2 {
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 0 0 5px #0ff, 0 0 10px #0ff;
      margin-bottom: 20px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-weight: bold;
      letter-spacing: 1px;
    }

    input, select {
      background: #0a0f1ecc;
      border: 1px solid #0ff;
      padding: 12px;
      border-radius: 16px;
      color: #0ff;
      font-size: 1rem;
      outline: none;
      transition: 0.2s;
    }

    input:focus, select:focus {
      box-shadow: 0 0 12px #0ff;
      border-color: #f0f;
    }

    button {
      background: linear-gradient(90deg, #0ff, #f0f);
      border: none;
      padding: 14px 28px;
      border-radius: 40px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #000;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 0 15px #0ff;
    }

    button:hover {
      transform: scale(1.02);
      box-shadow: 0 0 25px #f0f;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow-x: auto;
      display: block;
    }

    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #0ff3;
    }

    th {
      background: #0ff2;
      color: #0ff;
      text-shadow: 0 0 2px #0ff;
    }

    .status-badge {
      padding: 4px 12px;
      border-radius: 30px;
      font-weight: bold;
      background: #0a0f1e;
      display: inline-block;
    }

    .merah { color: #f66; text-shadow: 0 0 3px red; }
    .footer { text-align: center; margin-top: 30px; font-size: 12px; opacity: 0.7; }

    @media (max-width: 700px) {
      .neon-card { padding: 16px; }
      th, td { font-size: 12px; padding: 8px; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="neon-card">
    <h1>⚡ SHIFT JAGA - CYBERPUNK ⚡</h1>
    <div class="form-grid">
      <div class="input-group"><label>👤 Nama Lengkap</label><input type="text" id="nama" placeholder="Andi Wijaya" required></div>
      <div class="input-group"><label>⏰ Shift Jaga</label><select id="shift"><option value="Pagi">Pagi (07:00-19:00)</option><option value="Malam">Malam (19:00-07:00)</option></select></div>
      <div class="input-group"><label>📌 Status</label><select id="status"><option value="Masuk">Masuk</option><option value="Off">Off</option><option value="Cuti">Cuti</option></select></div>
      <div class="input-group"><label>🔴 Tanggal Merah</label><select id="merah"><option value="false">Tidak</option><option value="true">Ya (Libur Nasional)</option></select></div>
      <div class="input-group"><label>📅 Hari & Tanggal Otomatis</label><input type="text" id="hariOtomatis" readonly></div>
      <div class="input-group"><label>📆 Tanggal</label><input type="text" id="tglOtomatis" readonly></div>
      <div class="input-group"><label>🗓️ Bulan Tahun</label><input type="text" id="blnOtomatis" readonly></div>
    </div>
    <div style="margin-top: 25px; text-align: center;"><button id="simpanBtn">💾 SIMPAN SHIFT</button></div>
  </div>

  <div class="neon-card">
    <h2>📋 DATA SHIFT TERSIMPAN</h2>
    <div style="overflow-x: auto;">
      <table id="dataTable">
        <thead>
          <tr><th>Nama</th><th>Shift</th><th>Status</th><th>Tanggal Merah</th><th>Hari</th><th>Tanggal</th><th>Bulan/Tahun</th></tr>
        </thead>
        <tbody id="tableBody"><tr><td colspan="7" style="text-align:center">Memuat data...</td></tr></tbody>
      </table>
    </div>
  </div>
  <div class="footer">⚙️ CYBERPUNK SHIFT SYSTEM | DATA REAL-TIME</div>
</div>

<script>
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxJ4ZQC2IPX-k5LEMFHbCCsw_sT7lFRPowEPkdenwb5ocK004Ha_sml2iITd3MsQtQp4A/exec'; // GANTI DENGAN URL DEPLOY KAMU

  // Set otomatis tanggal sekarang
  function updateDateTime() {
    const now = new Date();
    const hariArr = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
    const bulanArr = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
    const hari = hariArr[now.getDay()];
    const tanggal = now.getDate();
    const bulanTahun = `${bulanArr[now.getMonth()]} ${now.getFullYear()}`;
    document.getElementById('hariOtomatis').value = hari;
    document.getElementById('tglOtomatis').value = tanggal;
    document.getElementById('blnOtomatis').value = bulanTahun;
  }
  updateDateTime();

  // Load data dari Google Sheets
  async function loadData() {
    try {
      const response = await fetch(WEB_APP_URL + '?action=getAll');
      const data = await response.json();
      const tbody = document.getElementById('tableBody');
      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7">Belum ada data shift</td></tr>';
        return;
      }
      tbody.innerHTML = '';
      data.forEach(row => {
        const tr = document.createElement('tr');
        const merahClass = row['TanggalMerah'] === 'Ya' ? 'merah' : '';
        tr.innerHTML = `
          <td>${row['NamaLengkap'] || '-'}</td>
          <td>${row['Shift'] || '-'}</td>
          <td><span class="status-badge">${row['Status'] || '-'}</span></td>
          <td class="${merahClass}">${row['TanggalMerah'] || 'Tidak'}</td>
          <td>${row['Hari'] || '-'}</td>
          <td>${row['Tanggal'] || '-'}</td>
          <td>${row['BulanTahun'] || '-'}</td>
        `;
        tbody.appendChild(tr);
      });
    } catch (err) {
      console.error(err);
      document.getElementById('tableBody').innerHTML = '<tr><td colspan="7">Gagal memuat data</td></tr>';
    }
  }

  // Simpan data baru
  async function simpanShift() {
    const nama = document.getElementById('nama').value.trim();
    if (!nama) return alert('Nama harus diisi!');
    const payload = {
      nama: nama,
      shift: document.getElementById('shift').value,
      status: document.getElementById('status').value,
      tanggalMerah: document.getElementById('merah').value === 'true',
      hari: document.getElementById('hariOtomatis').value,
      tanggal: document.getElementById('tglOtomatis').value,
      bulanTahun: document.getElementById('blnOtomatis').value
    };
    try {
      const response = await fetch(WEB_APP_URL, {
        method: 'POST',
        mode: 'no-cors', // karena Google Apps Script tidak support CORS complex, kita pakai trick
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ action: 'save', data: JSON.stringify(payload) })
      });
      alert('✅ Data shift tersimpan!');
      setTimeout(() => loadData(), 500);
      document.getElementById('nama').value = '';
    } catch (err) {
      alert('Gagal simpan: ' + err.message);
    }
  }

  document.getElementById('simpanBtn').addEventListener('click', simpanShift);
  window.onload = () => { loadData(); };
</script>
</body>
</html>
