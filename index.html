<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Shift Jaga | Cyberpunk</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Courier New', 'Fira Code', monospace;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
      color: #0ff;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .neon-card {
      background: rgba(10, 20, 30, 0.75);
      backdrop-filter: blur(12px);
      border: 1px solid #0ff;
      border-radius: 24px;
      box-shadow: 0 0 15px #0ff4, 0 0 5px #0ff2;
      padding: 24px;
      margin-bottom: 30px;
      transition: 0.3s;
    }

    .neon-card:hover {
      box-shadow: 0 0 30px #0ff, 0 0 10px #0ff;
    }

    h1, h2 {
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 0 0 5px #0ff, 0 0 10px #0ff;
      margin-bottom: 20px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-weight: bold;
      letter-spacing: 1px;
      font-size: 0.9rem;
    }

    input, select {
      background: #0a0f1ecc;
      border: 1px solid #0ff;
      padding: 12px;
      border-radius: 16px;
      color: #0ff;
      font-size: 1rem;
      outline: none;
      transition: 0.2s;
    }

    input:focus, select:focus {
      box-shadow: 0 0 12px #0ff;
      border-color: #f0f;
    }

    button {
      background: linear-gradient(90deg, #0ff, #f0f);
      border: none;
      padding: 14px 32px;
      border-radius: 40px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #000;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 0 15px #0ff;
      font-size: 1rem;
    }

    button:hover {
      transform: scale(1.02);
      box-shadow: 0 0 25px #f0f;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .table-wrapper {
      overflow-x: auto;
      border-radius: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px;
    }

    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #0ff3;
    }

    th {
      background: #0ff2;
      color: #0ff;
      text-shadow: 0 0 2px #0ff;
      font-weight: bold;
    }

    td {
      color: #cfcfff;
    }

    .status-badge {
      padding: 4px 12px;
      border-radius: 30px;
      font-weight: bold;
      background: #0a0f1e;
      display: inline-block;
    }

    .status-Masuk { color: #0f0; text-shadow: 0 0 3px #0f0; }
    .status-Off { color: #ff0; text-shadow: 0 0 3px #ff0; }
    .status-Cuti { color: #f80; text-shadow: 0 0 3px #f80; }
    .merah { color: #f66; text-shadow: 0 0 3px #f66; font-weight: bold; }

    .footer {
      text-align: center;
      margin-top: 30px;
      font-size: 12px;
      opacity: 0.7;
    }

    .loading {
      text-align: center;
      padding: 40px;
      font-size: 1.2rem;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #0a0f1e;
      border: 1px solid #0ff;
      padding: 12px 24px;
      border-radius: 40px;
      z-index: 999;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @media (max-width: 700px) {
      .neon-card { padding: 16px; }
      th, td { font-size: 12px; padding: 8px; }
      button { padding: 10px 20px; font-size: 0.9rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="neon-card">
    <h1>⚡ SHIFT JAGA - CYBERPUNK ⚡</h1>
    <div class="form-grid">
      <div class="input-group">
        <label>👤 Nama Lengkap</label>
        <input type="text" id="nama" placeholder="Andi Wijaya" required>
      </div>
      <div class="input-group">
        <label>⏰ Shift Jaga</label>
        <select id="shift">
          <option value="Pagi">Pagi (07:00-19:00)</option>
          <option value="Malam">Malam (19:00-07:00)</option>
        </select>
      </div>
      <div class="input-group">
        <label>📌 Status</label>
        <select id="status">
          <option value="Masuk">Masuk</option>
          <option value="Off">Off</option>
          <option value="Cuti">Cuti</option>
        </select>
      </div>
      <div class="input-group">
        <label>🔴 Tanggal Merah (Libur Nasional)</label>
        <select id="merah">
          <option value="false">Tidak</option>
          <option value="true">Ya</option>
        </select>
      </div>
      <div class="input-group">
        <label>📅 Hari & Tanggal Otomatis</label>
        <input type="text" id="hariOtomatis" readonly style="background:#0a0f1e55">
      </div>
      <div class="input-group">
        <label>📆 Tanggal (Angka)</label>
        <input type="text" id="tglOtomatis" readonly style="background:#0a0f1e55">
      </div>
      <div class="input-group">
        <label>🗓️ Bulan Tahun</label>
        <input type="text" id="blnOtomatis" readonly style="background:#0a0f1e55">
      </div>
    </div>
    <div style="margin-top: 25px; text-align: center;">
      <button id="simpanBtn">💾 SIMPAN SHIFT</button>
    </div>
  </div>

  <div class="neon-card">
    <h2>📋 DATA SHIFT TERSIMPAN</h2>
    <div class="table-wrapper">
      <table id="dataTable">
        <thead>
          <tr>
            <th>Nama</th>
            <th>Shift</th>
            <th>Status</th>
            <th>Tanggal Merah</th>
            <th>Hari</th>
            <th>Tanggal</th>
            <th>Bulan/Tahun</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="7" style="text-align:center">🔄 Memuat data...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <div class="footer">
    ⚙️ CYBERPUNK SHIFT SYSTEM | DATA REAL-TIME | v2.0
  </div>
</div>

<script>
  // ========================
  // ⚠️ GANTI DENGAN URL WEB APP KAMU ⚠️
  // ========================
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyYhttjDuOvkiQRZGqFrJxQuVpz2Q7czTzWjAfmgglMXknf0QUWW-UgJIL4ur9d2QAr_g/exec';
  
  // Update tanggal otomatis
  function updateDateTime() {
    const now = new Date();
    const hariArr = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
    const bulanArr = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
    const hari = hariArr[now.getDay()];
    const tanggal = now.getDate();
    const bulanTahun = `${bulanArr[now.getMonth()]} ${now.getFullYear()}`;
    document.getElementById('hariOtomatis').value = hari;
    document.getElementById('tglOtomatis').value = tanggal;
    document.getElementById('blnOtomatis').value = bulanTahun;
    return { hari, tanggal, bulanTahun };
  }
  
  // Tampilkan notifikasi
  function showToast(message, isError = false) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.style.borderColor = isError ? '#f66' : '#0f0';
    toast.style.color = isError ? '#f66' : '#0f0';
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }
  
  // Load data dari Google Sheets
  async function loadData() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">🔄 Memuat data...</td></tr>';
    
    try {
      const response = await fetch(`${WEB_APP_URL}?action=getAll`, {
        method: 'GET',
        mode: 'cors'
      });
      
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      
      const data = await response.json();
      
      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">📭 Belum ada data shift</td></tr>';
        return;
      }
      
      if (data.error) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center">❌ Error: ${data.error}</td></tr>`;
        return;
      }
      
      tbody.innerHTML = '';
      data.forEach(row => {
        const tr = document.createElement('tr');
        const merahClass = row['TanggalMerah'] === 'Ya' ? 'merah' : '';
        const statusClass = `status-${row['Status'] || ''}`;
        
        tr.innerHTML = `
          <td><strong>${escapeHtml(row['NamaLengkap'] || '-')}</strong></td>
          <td>${escapeHtml(row['Shift'] || '-')}</td>
          <td><span class="status-badge ${statusClass}">${escapeHtml(row['Status'] || '-')}</span></td>
          <td class="${merahClass}">${row['TanggalMerah'] || 'Tidak'}</td>
          <td>${escapeHtml(row['Hari'] || '-')}</td>
          <td>${escapeHtml(row['Tanggal'] || '-')}</td>
          <td>${escapeHtml(row['BulanTahun'] || '-')}</td>
        `;
        tbody.appendChild(tr);
      });
      
      showToast(`✅ Memuat ${data.length} data`, false);
      
    } catch (err) {
      console.error('Load error:', err);
      tbody.innerHTML = `<tr><td colspan="7" style="text-align:center">❌ Gagal memuat data: ${err.message}</td></tr>`;
      showToast('❌ Gagal memuat data', true);
    }
  }
  
  // Escape HTML untuk keamanan
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  // Simpan data shift
  async function simpanShift() {
    const nama = document.getElementById('nama').value.trim();
    if (!nama) {
      showToast('⚠️ Nama lengkap harus diisi!', true);
      return;
    }
    
    const dateData = updateDateTime();
    
    const payload = {
      nama: nama,
      shift: document.getElementById('shift').value,
      status: document.getElementById('status').value,
      tanggalMerah: document.getElementById('merah').value === 'true',
      hari: dateData.hari,
      tanggal: dateData.tanggal.toString(),
      bulanTahun: dateData.bulanTahun
    };
    
    const btn = document.getElementById('simpanBtn');
    btn.disabled = true;
    btn.textContent = '⌛ MENYIMPAN...';
    
    try {
      const response = await fetch(WEB_APP_URL, {
        method: 'POST',
        mode: 'cors',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(payload)
      });
      
      const result = await response.json();
      
      if (result.success) {
        showToast('✅ Data shift berhasil tersimpan!', false);
        document.getElementById('nama').value = '';
        await loadData(); // Reload data
      } else {
        showToast(`❌ Gagal: ${result.message || result.error}`, true);
      }
      
    } catch (err) {
      console.error('Save error:', err);
      showToast(`❌ Error: ${err.message}`, true);
    } finally {
      btn.disabled = false;
      btn.textContent = '💾 SIMPAN SHIFT';
    }
  }
  
  // Event listeners
  document.getElementById('simpanBtn').addEventListener('click', simpanShift);
  
  // Initial load
  updateDateTime();
  loadData();
  
  // Auto refresh setiap 30 detik
  setInterval(() => {
    loadData();
  }, 30000);
</script>
</body>
</html>
