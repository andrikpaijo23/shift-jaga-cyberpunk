<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>CyberShift - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
            min-height: 100vh;
            padding: 20px;
            color: #0ff;
        }

        .glass-card {
            background: rgba(10, 20, 30, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 255, 0.4);
            border-radius: 28px;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.2);
            padding: 24px;
            transition: all 0.3s ease;
        }

        .btn-cyber {
            background: linear-gradient(135deg, #0a0f2a, #001122);
            border: 1.5px solid #0ff;
            color: #0ff;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
            font-size: 0.9rem;
        }

        .btn-cyber:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 20px #0ff;
            transform: translateY(-2px);
        }

        .btn-danger {
            border-color: #ff3366;
            color: #ff6699;
        }

        .btn-danger:hover {
            background: #ff3366;
            color: #000;
            box-shadow: 0 0 20px #ff3366;
        }

        .btn-success {
            border-color: #0f0;
            color: #0f0;
        }

        .btn-success:hover {
            background: #0f0;
            color: #000;
        }

        input, select, textarea {
            background: #0a0f1c;
            border: 1px solid #0ff;
            border-radius: 20px;
            padding: 10px 16px;
            color: #0ff;
            width: 100%;
            outline: none;
            font-size: 0.9rem;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #f0f;
            box-shadow: 0 0 8px #f0f;
        }

        label {
            font-weight: bold;
            margin-bottom: 6px;
            display: block;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (min-width: 900px) {
            .dashboard {
                grid-template-columns: 1fr 1.6fr;
            }
        }

        .scroll-table {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 8px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            text-align: left;
        }

        th {
            color: #f0f;
            font-weight: bold;
            font-size: 0.85rem;
        }

        td {
            font-size: 0.8rem;
        }

        .status-badge {
            background: rgba(0, 255, 255, 0.15);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            display: inline-block;
        }

        .delete-btn {
            background: rgba(255, 51, 102, 0.2);
            border: 1px solid #ff3366;
            color: #ff6699;
            cursor: pointer;
            font-size: 1rem;
            padding: 5px 12px;
            border-radius: 20px;
            transition: 0.2s;
        }

        .delete-btn:hover {
            background: #ff3366;
            color: #000;
            transform: scale(1.05);
        }

        .header-cyber {
            text-align: center;
            margin-bottom: 24px;
        }

        .header-cyber h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #0ff, #f0f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .filter-bar {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .filter-bar input, .filter-bar select {
            flex: 1;
        }

        @media (max-width: 768px) {
            body { padding: 12px; }
            .glass-card { padding: 16px; }
            th, td { padding: 8px 4px; font-size: 0.7rem; }
            .btn-cyber { padding: 8px 16px; font-size: 0.8rem; }
            .header-cyber h1 { font-size: 1.3rem; }
        }

        .alert {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #0ff;
            color: #000;
            padding: 12px 20px;
            border-radius: 10px;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="mainContent">
        <div class="header-cyber">
            <h1>⚡ ADMIN PANEL - CYBER SHIFT ⚡</h1>
            <p style="color: #9cf;">Mode Edit & Tambah Data Shift Jaga</p>
        </div>

        <div class="top-bar">
            <a href="index.html" class="btn-cyber" style="text-decoration: none;">← Halaman Utama</a>
            <button id="logoutBtn" class="btn-cyber btn-danger">🚪 LOGOUT</button>
        </div>

        <div class="dashboard">
            <!-- FORM TAMBAH DATA -->
            <div class="glass-card">
                <h2 style="border-left: 5px solid #f0f; padding-left: 15px; margin-bottom: 20px;">✍️ TAMBAH DATA JAGA</h2>
                <form id="shiftForm">
                    <div class="form-group">
                        <label>👤 NAMA LENGKAP</label>
                        <input type="text" id="namaLengkap" placeholder="Contoh: Andika Pratama" required>
                    </div>
                    <div class="form-group">
                        <label>📅 TANGGAL</label>
                        <input type="date" id="tanggal" required>
                    </div>
                    <div class="form-group">
                        <label>⚙️ STATUS JAGA</label>
                        <select id="statusJaga" required>
                            <option value="Pagi">🌞 PAGI (07:00 - 19:00)</option>
                            <option value="Malam">🌙 MALAM (19:00 - 07:00)</option>
                            <option value="OFF">💤 OFF</option>
                            <option value="Cuti">🏖️ CUTI</option>
                            <option value="Tanggal Merah">🔴 TANGGAL MERAH</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>📝 CATATAN (Optional)</label>
                        <textarea id="catatan" rows="2" placeholder="Shift khusus, lembur, keterangan tambahan..."></textarea>
                    </div>
                    <button type="submit" class="btn-cyber" style="width:100%">💾 SIMPAN DATA SHIFT</button>
                </form>
                <hr style="border-color:#0ff3; margin: 20px 0;">
                <button id="resetAllDataBtn" class="btn-cyber btn-danger" style="width:100%">⚠️ RESET SEMUA DATA ⚠️</button>
            </div>

            <!-- TABEL DATA -->
            <div class="glass-card">
                <h2 style="border-left: 5px solid #0ff; padding-left: 15px;">📊 MANAJEMEN DATA SHIFT</h2>
                <div class="filter-bar">
                    <input type="text" id="filterNama" placeholder="🔍 Filter Nama...">
                    <select id="filterShift">
                        <option value="">Semua Shift</option>
                        <option value="Pagi">🌞 Pagi</option>
                        <option value="Malam">🌙 Malam</option>
                        <option value="OFF">💤 OFF</option>
                        <option value="Cuti">🏖️ Cuti</option>
                        <option value="Tanggal Merah">🔴 Tanggal Merah</option>
                    </select>
                    <button id="clearFilter" class="btn-cyber">⟳ Reset</button>
                </div>
                <div class="scroll-table">
                    <table id="dataTable">
                        <thead>
                            <tr>
                                <th>Nama</th>
                                <th>Tanggal</th>
                                <th>Shift</th>
                                <th>Jam</th>
                                <th>Catatan</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr><td colspan="6" style="text-align:center">🔄 Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div id="statsPanel" style="margin-top: 15px; font-size: 12px; text-align: center; color: #6cf;"></div>
            </div>
        </div>
    </div>

    <script>
        // CEK LOGIN - Redirect jika belum login
        (function checkAuth() {
            const isLoggedIn = sessionStorage.getItem('admin_logged_in');
            if (!isLoggedIn || isLoggedIn !== 'true') {
                window.location.href = 'admin-login.html';
            }
        })();

        let shiftData = [];

        // Fungsi jam jaga
        function getJamRange(status) {
            const map = {
                'Pagi': '07:00 - 19:00',
                'Malam': '19:00 - 07:00',
                'OFF': '— OFF —',
                'Cuti': 'Cuti Resmi',
                'Tanggal Merah': 'Libur Nasional'
            };
            return map[status] || '—';
        }

        // Format tanggal
        function formatTanggal(dateStr) {
            if (!dateStr) return '-';
            const parts = dateStr.split('-');
            if (parts.length !== 3) return dateStr;
            return `${parts[2]}/${parts[1]}/${parts[0]}`;
        }

        // Escape HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Load data
        function loadData() {
            const stored = localStorage.getItem('cyber_jaga_db');
            if (stored) {
                try {
                    shiftData = JSON.parse(stored);
                    if (!Array.isArray(shiftData)) shiftData = [];
                } catch(e) {
                    console.error('Error:', e);
                    shiftData = [];
                }
            } else {
                shiftData = [];
            }
            renderTable();
            updateStats();
        }

        // Save data
        function saveData() {
            localStorage.setItem('cyber_jaga_db', JSON.stringify(shiftData));
            renderTable();
            updateStats();
            // Trigger storage event untuk halaman utama
            window.dispatchEvent(new StorageEvent('storage', { key: 'cyber_jaga_db' }));
        }

        // Update statistik
        function updateStats() {
            const statsDiv = document.getElementById('statsPanel');
            if (!statsDiv) return;
            const total = shiftData.length;
            statsDiv.innerHTML = `📊 Total Data: ${total} | 🗑️ Klik tombol hapus untuk menghapus data`;
        }

        // Render tabel
        function renderTable() {
            const filterNama = document.getElementById('filterNama')?.value.toLowerCase() || '';
            const filterShiftVal = document.getElementById('filterShift')?.value || '';

            let filtered = [...shiftData];
            if (filterNama) {
                filtered = filtered.filter(item => item.nama && item.nama.toLowerCase().includes(filterNama));
            }
            if (filterShiftVal) {
                filtered = filtered.filter(item => item.status === filterShiftVal);
            }

            filtered.sort((a, b) => (b.tanggal || '').localeCompare(a.tanggal || ''));

            const tbody = document.getElementById('tableBody');
            if (!tbody) return;

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">⚡ Tidak ada data shift ⚡</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(item => `
                <tr>
                    <td><strong>${escapeHtml(item.nama)}</strong></td>
                    <td>${formatTanggal(item.tanggal)}</td>
                    <td><span class="status-badge">${escapeHtml(item.status)}</span></td>
                    <td>${getJamRange(item.status)}</td>
                    <td>${escapeHtml(item.catatan || '-')}</td>
                    <td>
                        <button class="delete-btn" data-id="${item.id}">🗑️ Hapus</button>
                    </td>
                </tr>
            `).join('');

            // Event delete
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = parseInt(btn.getAttribute('data-id'));
                    if (confirm('⚠️ Yakin ingin menghapus data shift ini?')) {
                        shiftData = shiftData.filter(d => d.id !== id);
                        saveData();
                        showAlert('✅ Data berhasil dihapus!', 'success');
                    }
                });
            });
        }

        // Show alert notifikasi
        function showAlert(message, type = 'success') {
            const alert = document.createElement('div');
            alert.className = 'alert';
            alert.style.background = type === 'success' ? '#0f0' : '#f33';
            alert.style.color = '#000';
            alert.innerHTML = message;
            document.body.appendChild(alert);
            setTimeout(() => alert.remove(), 2000);
        }

        // Tambah data
        function addShift(e) {
            e.preventDefault();
            
            const nama = document.getElementById('namaLengkap').value.trim();
            const tanggal = document.getElementById('tanggal').value;
            const status = document.getElementById('statusJaga').value;
            const catatan = document.getElementById('catatan').value.trim();

            if (!nama) {
                alert('❌ Nama lengkap wajib diisi!');
                return;
            }
            if (!tanggal) {
                alert('❌ Tanggal wajib diisi!');
                return;
            }

            const newShift = {
                id: Date.now(),
                nama: nama,
                tanggal: tanggal,
                status: status,
                catatan: catatan || '',
                createdAt: new Date().toISOString()
            };
            
            shiftData.unshift(newShift);
            saveData();
            
            // Reset form
            document.getElementById('shiftForm').reset();
            document.getElementById('catatan').value = '';
            
            showAlert('✅ Data shift berhasil disimpan!');
        }

        // Reset semua data
        function resetAllData() {
            if (confirm('⚠️ PERINGATAN! Ini akan menghapus SEMUA data shift secara permanen. Yakin?')) {
                shiftData = [];
                saveData();
                showAlert('⚠️ Semua data telah direset!');
            }
        }

        // Logout
        function logout() {
            sessionStorage.removeItem('admin_logged_in');
            sessionStorage.removeItem('admin_login_time');
            window.location.href = 'admin-login.html';
        }

        // Setup filter
        function setupFilters() {
            const filterNama = document.getElementById('filterNama');
            const filterShift = document.getElementById('filterShift');
            const clearBtn = document.getElementById('clearFilter');

            if (filterNama) filterNama.addEventListener('input', renderTable);
            if (filterShift) filterShift.addEventListener('change', renderTable);
            if (clearBtn) {
                clearBtn.addEventListener('click', () => {
                    if (filterNama) filterNama.value = '';
                    if (filterShift) filterShift.value = '';
                    renderTable();
                });
            }
        }

        // Inisialisasi
        window.addEventListener('DOMContentLoaded', () => {
            loadData();
            setupFilters();
            
            document.getElementById('shiftForm')?.addEventListener('submit', addShift);
            document.getElementById('resetAllDataBtn')?.addEventListener('click', resetAllData);
            document.getElementById('logoutBtn')?.addEventListener('click', logout);
            
            // Set tanggal default ke hari ini
            const today = new Date().toISOString().split('T')[0];
            const tanggalInput = document.getElementById('tanggal');
            if (tanggalInput) tanggalInput.value = today;
        });
    </script>
</body>
</html>
